<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>InfraSantAlert</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css?v=2" />
    </head>
    <body>
        <div class="bg-orb orb-a"></div>
        <div class="bg-orb orb-b"></div>

        <header class="header">
            <div class="container header-content">
                <div class="brand-wrap">
                    <div class="brand-seal" aria-hidden="true">ISA</div>
                    <div>
                        <h1>InfraSantAlert</h1>
                        <p class="subtitle">Monitoramento urbano de vias em Santarem</p>
                    </div>
                </div>
                <div class="header-badge">Painel Operacional Municipal</div>
            </div>
        </header>

        <main class="container dashboard" id="dashboardRoot">
            <section class="stats-grid" aria-label="Indicadores">
                <article class="stat-card">
                    <p>Total de vias</p>
                    <strong id="totalVias">0</strong>
                </article>
                <article class="stat-card warning">
                    <p>Em manutencao</p>
                    <strong id="totalManutencao">0</strong>
                </article>
                <article class="stat-card danger">
                    <p>Interditadas</p>
                    <strong id="totalInterditadas">0</strong>
                </article>
            </section>

            <section class="layout-grid">
                <article class="panel glass">
                    <div class="panel-head">
                        <h2>Cadastrar Nova Via</h2>
                    </div>

                    <form id="viaForm" class="form-grid">
                        <div class="field">
                            <label for="rua">Rua</label>
                            <input id="rua" name="rua" placeholder="Ex.: Avenida Cuiaba" required />
                        </div>
                        <div class="field">
                            <label for="bairro">Bairro</label>
                            <input id="bairro" name="bairro" placeholder="Ex.: Matinha" required />
                        </div>
                        <div class="field">
                            <label for="status">Status</label>
                            <select id="status" name="status" required>
                                <option value="Interditada">Interditada</option>
                                <option value="Manutenção">Manutencao</option>
                                <option value="Liberada">Liberada</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="previsaoLiberacao">Previsao de liberacao</label>
                            <input id="previsaoLiberacao" name="previsaoLiberacao" type="date" />
                        </div>
                        <div class="field field-full">
                            <label for="motivo">Motivo</label>
                            <textarea
                                id="motivo"
                                name="motivo"
                                rows="4"
                                placeholder="Ex.: Recapeamento, manutencao de drenagem ou buracos"
                            ></textarea>
                        </div>

                        <div class="form-actions field-full">
                            <button id="submitBtn" type="submit" class="btn-primary">
                                <span class="btn-text">Cadastrar via</span>
                                <span class="btn-loader" aria-hidden="true"></span>
                            </button>
                        </div>
                    </form>
                </article>

                <article class="panel panel-list">
                    <div class="panel-head list-head">
                        <div>
                            <h2>Vias cadastradas</h2>
                        </div>
                        <div class="filters-card">
                            <div class="filters-card-head">
                                <!-- title removed as requested -->
                            </div>

                            <div class="filters-bar">
                                <div class="filters-bar-left">
                                    <div class="search-input-wrap">
                                        <span class="filter-icon" aria-hidden="true">
                                            <svg viewBox="0 0 24 24" role="presentation" focusable="false">
                                                <path d="M10.5 4a6.5 6.5 0 1 0 4.13 11.55l4.41 4.4 1.41-1.41-4.4-4.41A6.5 6.5 0 0 0 10.5 4Zm0 2a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9Z" />
                                            </svg>
                                        </span>
                                        <input id="searchInput" class="search-input" type="search" placeholder="Pesquisar rua..." aria-label="Pesquisar ruas" />
                                    </div>
                                </div>

                                <div class="filters-bar-right">
                                    <button id="filtersToggle" class="filters-toggle" type="button" aria-expanded="false" aria-controls="filtersPanel">
                                        <span class="filters-toggle-icon" aria-hidden="true">
                                            <svg viewBox="0 0 24 24" role="presentation" focusable="false">
                                                <path d="M3 5h18l-7 8v5l-4 2v-7z" />
                                            </svg>
                                        </span>
                                        Filtros
                                    </button>

                                    <div class="filters-actions">
                                        <button id="refreshBtn" class="btn-secondary" type="button">Atualizar</button>
                                    </div>
                                </div>
                            </div>

                            <div id="filtersPanel" class="filters-panel" hidden>
                                <div class="filters-grid">
                                    <div class="filter-field">
                                        <label for="statusFilter">Status</label>
                                        <select id="statusFilter" class="select-filter" aria-label="Filtrar por status">
                                            <option value="Todas">Todas</option>
                                            <option value="Interditada">Interditadas</option>
                                            <option value="Manutenção">Manutenção</option>
                                            <option value="Liberada">Liberadas</option>
                                        </select>
                                    </div>
                                    <div class="filter-field">
                                        <label for="bairroFilter">Bairro</label>
                                        <select id="bairroFilter" class="select-filter" aria-label="Filtrar por bairro">
                                            <option value="">Todos os bairros</option>
                                        </select>
                                    </div>
                                    <div class="filter-field">
                                        <label for="sortSelect">Ordenar</label>
                                        <select id="sortSelect" class="select-filter" aria-label="Ordenar">
                                            <option value="recent">Mais recentes</option>
                                            <option value="oldest">Mais antigas</option>
                                            <option value="alpha">Ordem alfabética</option>
                                            <option value="previsao">Previsão mais próxima</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="listState" class="list-state">Carregando dados...</div>
                    <div class="table-wrap">
                        <div id="resultCount" class="result-count" aria-live="polite"></div>
                        <div id="viasList" class="vias-table-container" aria-live="polite"></div>
                    </div>
                </article>
            </section>
        </main>

        <div id="toastStack" class="toast-stack" aria-live="assertive" aria-atomic="true"></div>

        <footer class="footer">
            <div class="container">InfraSantAlert • Plataforma de Inteligencia de Mobilidade Urbana</div>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
